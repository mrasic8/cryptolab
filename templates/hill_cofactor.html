<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hill Cofactor</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <aside class="sidebar">
    <div class="logo">Crypto Lab</div>
    <nav><ul><li><a href="{{ url_for('home') }}" class="home-btn">Dashboard</a></li></ul></nav>
  </aside>

  <main class="content">
    <header>
      <h1>Hill Cofactor</h1>
    </header>

    <section>
      <form method="POST">
        <label>Matrix Dimension (n):</label>
        <input type="number" name="size" value="{{ request.form.get('size', '') }}" required>
        
        <label>Matrix:</label>
        <textarea name="matrix" required>{{ request.form.get('matrix', '') }}</textarea>
        
        <button type="submit">Compute</button>
      </form>

      <div class="error-message">{{ error if error }}</div>

      <h3>Cofactor Matrix:</h3>
      <pre class="output-box">{{ result if result }}</pre>
    </section>
  </main>
</body>
</html>
